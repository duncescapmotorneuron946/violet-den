# VioletDen Docker Compose
# If build hangs on "resolving provenance", run:
#   BUILDX_NO_DEFAULT_ATTESTATIONS=1 docker compose build

services:

  # ── HTTPS reverse proxy ─────────────────────────────────
  violetden-nginx:
    build: ./nginx
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - certs:/certs
    environment:
      - BACKEND_PORT=${BACKEND_PORT:-4000}
    depends_on:
      - violetden-frontend
      - violetden-backend
    restart: unless-stopped

  # ── Frontend (Vite) ────────────────────────────────────
  violetden-frontend:
    build: ./frontend
    expose:
      - "5173"
    environment:
      - VITE_PRESET_SECTIONS=${VITE_PRESET_SECTIONS}
      - VITE_API_TARGET=http://violetden-backend:${BACKEND_PORT:-4000}
    depends_on:
      - violetden-backend
    restart: unless-stopped

  # ── Backend (Express) ──────────────────────────────────
  violetden-backend:
    build: ./backend
    expose:
      - "${BACKEND_PORT:-4000}"
    volumes:
      - certs:/certs
      - data:/data
    environment:
      - BACKEND_PORT=${BACKEND_PORT:-4000}
      - ADMIN_USERNAME
      - ADMIN_PASSWORD
      - CERT_DIR=/certs
      - DATA_DIR=/data
    restart: unless-stopped

volumes:
  certs:
  data:
