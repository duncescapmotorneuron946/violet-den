# VioletDen Docker Compose
# If build hangs on "resolving provenance", run:
#   BUILDX_NO_DEFAULT_ATTESTATIONS=1 docker compose build

services:

  # ── HTTPS reverse proxy ─────────────────────────────────
  violetden-nginx:
    build: ./nginx
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - certs:/certs
      - acme:/acme-data
    environment:
      - BACKEND_PORT=${BACKEND_PORT:-4000}
      - DOMAIN=${DOMAIN:-}
      - DNS_PROVIDER=${DNS_PROVIDER:-}
      # DNS provider credentials — pass through all common provider env vars
      - CF_Token=${CF_Token:-}
      - CF_Account_ID=${CF_Account_ID:-}
      - CF_Zone_ID=${CF_Zone_ID:-}
      - CF_Key=${CF_Key:-}
      - CF_Email=${CF_Email:-}
      - DO_AUTH_TOKEN=${DO_AUTH_TOKEN:-}
      - GANDI_LIVEDNS_KEY=${GANDI_LIVEDNS_KEY:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - LINODE_V4_API_KEY=${LINODE_V4_API_KEY:-}
      - DuckDNS_Token=${DuckDNS_Token:-}
      - GD_Key=${GD_Key:-}
      - GD_Secret=${GD_Secret:-}
    depends_on:
      - violetden-frontend
      - violetden-backend
    restart: unless-stopped

  # ── Frontend (Vite) ────────────────────────────────────
  violetden-frontend:
    build: ./frontend
    expose:
      - "5173"
    environment:
      - VITE_PRESET_SECTIONS=${VITE_PRESET_SECTIONS}
      - VITE_API_TARGET=http://violetden-backend:${BACKEND_PORT:-4000}
    depends_on:
      - violetden-backend
    restart: unless-stopped

  # ── Backend (Express) ──────────────────────────────────
  violetden-backend:
    build: ./backend
    expose:
      - "${BACKEND_PORT:-4000}"
    volumes:
      - certs:/certs
      - data:/data
    environment:
      - BACKEND_PORT=${BACKEND_PORT:-4000}
      - ADMIN_USERNAME
      - ADMIN_PASSWORD
      - CORS_ORIGINS=${CORS_ORIGINS:-}
      - CERT_DIR=/certs
      - DATA_DIR=/data
    restart: unless-stopped

volumes:
  certs:
  data:
  acme:
