<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e0a50"/>
      <stop offset="100%" stop-color="#0c0c1e"/>
    </linearGradient>
    <linearGradient id="fg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#4c1d95" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <!-- Soft glow layer -->
  <ellipse cx="16" cy="13" rx="10" ry="9" fill="url(#glow)"/>
  <!-- Shadow / glow behind house -->
  <polygon points="16,6 5,16 9,16 9,26 23,26 23,16 27,16" fill="#7c3aed" filter="url(#blur)" opacity="0.5"/>
  <!-- House body -->
  <polygon points="16,6 5,16 9,16 9,26 23,26 23,16 27,16" fill="url(#fg)"/>
  <!-- Door -->
  <rect x="13.5" y="19" width="5" height="7" rx="1" fill="url(#bg)" opacity="0.9"/>
  <!-- Window left -->
  <rect x="10" y="17.5" width="3.5" height="3" rx="0.6" fill="url(#bg)" opacity="0.8"/>
  <!-- Window right -->
  <rect x="18.5" y="17.5" width="3.5" height="3" rx="0.6" fill="url(#bg)" opacity="0.8"/>
  <!-- Chimney dot / hub indicator -->
  <circle cx="21" cy="9" r="1.5" fill="#c4b5fd" opacity="0.9"/>
</svg>
